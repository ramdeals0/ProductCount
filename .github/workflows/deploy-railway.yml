name: Deploy API to Railway

on:
  push:
    branches:
      - main
      - cursor/shopcount-mvp-1e85
  workflow_dispatch:

concurrency:
  group: railway-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy ShopCount API
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Railway token
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set."
            echo "Create a project token at https://railway.com/account/tokens"
            echo "Then add it as a GitHub repository secret named RAILWAY_TOKEN"
            exit 1
          fi

      - name: Deploy to Railway
        run: railway up --ci --service ProductCount

      - name: Deployment summary
        if: success()
        run: echo "ShopCount API deployed successfully to Railway."
