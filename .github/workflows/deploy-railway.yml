name: Deploy API to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: railway-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy ShopCount API
    # Skip when RAILWAY_TOKEN is not configured — Railway GitHub integration deploys on push to main.
    if: ${{ secrets.RAILWAY_TOKEN != '' }}
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Railway
        run: railway up --ci --service ProductCount

      - name: Deployment summary
        if: success()
        run: echo "ShopCount API deployed successfully to Railway."
